services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ibirdos
      POSTGRES_USER: ibirdos
      POSTGRES_PASSWORD: ${DB_PASSWORD:-ibirdos_dev}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/migrations/001_schema.sql:/docker-entrypoint-initdb.d/001_schema.sql
      - ./database/migrations/002_audit_gaps.sql:/docker-entrypoint-initdb.d/002_audit_gaps.sql
      - ./database/migrations/003_v2_final.sql:/docker-entrypoint-initdb.d/003_v2_final.sql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ibirdos"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ibirdos:${DB_PASSWORD:-ibirdos_dev}@postgres:5432/ibirdos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
      PORT: 3001
    ports:
      - "3001:3001"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./logs:/app/logs

  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      DATABASE_URL: postgresql://ibirdos:${DB_PASSWORD:-ibirdos_dev}@postgres:5432/ibirdos
      REDIS_URL: redis://redis:6379
      NODE_ENV: production
    command: node src/workers/queue.js
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:3001/api
      NEXT_PUBLIC_APP_URL: http://localhost:3000
      NODE_ENV: production
      PORT: 3000   # 🔥 CRITICAL FIX
    ports:
      - "3000:3000"
    depends_on:
      - backend

volumes:
  postgres_data:
  redis_data: